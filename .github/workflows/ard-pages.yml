name: Publish ARD catalog

# Generates the ARD documents from server.py / ard.py and deploys them to
# GitHub Pages, so the ai-catalog.json is publicly hosted for discovery. The
# catalog is always self-contained (ARD_EMBED_CARD=true) and re-published on
# every change, so it never goes stale.
#
# REQUIRED one-time setup to publish (see the README "Static hosting on GitHub
# Pages" section):
#   1. Settings -> Pages -> Build and deployment -> Source: "GitHub Actions".
#   2. Settings -> Secrets and variables -> Actions -> Variables:
#        ARD_PAGES_ENABLED = true
# The deploy job is gated on ARD_PAGES_ENABLED, so until you set it the workflow
# stays green: the "Build ARD catalog" job still generates and validates the
# catalog, and "Deploy to GitHub Pages" is skipped (the GITHUB_TOKEN cannot
# enable Pages for you). After both steps, every change re-publishes the catalog.
#
# Optional repo variables (Settings -> Secrets and variables -> Actions -> Variables):
#   ARD_DOMAIN      urn:air publisher namespace (defaults to <owner>.github.io)
#   ARD_PUBLIC_URL  e.g. https://arrstack.example.com   (optional endpoint)
#   ARD_HOST_NAME   e.g. My Homelab             (optional)
#   ARD_DID_WEB     opt-in did:web identity; only for a domain whose root
#                   serves /.well-known/did.json (a project Pages site can't)
# No custom domain or DNS is required: the catalog is hosted on your
# <owner>.github.io Pages domain and anchored to that urn:air identity by
# default. did:web is left off unless ARD_DID_WEB is explicitly set.

on:
  push:
    branches: [main]
    paths:
      - "server.py"
      - "ard.py"
      - "requirements.txt"
      - ".github/pages/**"
      - ".github/workflows/ard-pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent Pages deployment; let an in-progress run finish.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: Build ARD catalog
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Generate ARD documents
        env:
          # All tools are advertised regardless of which services you run, so
          # the public catalog describes the full capability surface.
          ENABLED_SERVICES: all
          ARD_DOMAIN: ${{ vars.ARD_DOMAIN }}
          ARD_PUBLIC_URL: ${{ vars.ARD_PUBLIC_URL }}
          ARD_HOST_NAME: ${{ vars.ARD_HOST_NAME }}
          ARD_DID_WEB: ${{ vars.ARD_DID_WEB }}
          OWNER: ${{ github.repository_owner }}
          # Self-contained manifest: embed the server card inline so the file
          # works no matter where it is hosted.
          ARD_EMBED_CARD: "true"
        run: |
          # No ARD_DOMAIN set? Anchor the identity to the GitHub Pages domain you
          # already control (e.g. ct4nk3r.github.io) instead of a "localhost" URN.
          if [ -z "$ARD_DOMAIN" ]; then
            export ARD_DOMAIN="${OWNER}.github.io"
            echo "::notice::ARD_DOMAIN not set; defaulting publisher identity to ${ARD_DOMAIN}."
          fi
          mkdir -p _site/.well-known
          # Disable Jekyll so the dotted .well-known directory is published.
          touch _site/.nojekyll
          # Serve the catalog at the canonical well-known path and at the root.
          python server.py --print-catalog | tee _site/.well-known/ai-catalog.json > _site/ai-catalog.json
          python server.py --print-server-card | tee _site/.well-known/mcp-server-card.json > _site/mcp-server-card.json
          cp .github/pages/index.html _site/index.html

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    # Opt-in gate: the deploy can only work once Pages is enabled (Settings ->
    # Pages -> Source: "GitHub Actions"), which the GITHUB_TOKEN can't do for
    # you. Set the repo variable ARD_PAGES_ENABLED=true after enabling Pages.
    # Until then this job is skipped, so the workflow stays green (the build job
    # still generates and validates the catalog) instead of failing on deploy.
    if: ${{ vars.ARD_PAGES_ENABLED == 'true' }}
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
